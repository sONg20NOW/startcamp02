<!-- 배경 파티클 애니메이션 컴포넌트 -->
<canvas id="bg-particles" class="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1]"></canvas>

<script>
    (function() {
        const canvas = document.getElementById('bg-particles');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        const numberOfParticles = 200; // 화면에 떠다닐 파티클 개수 (과하지 않게 최적화)

        // 브라우저 창 크기에 맞게 캔버스 사이즈 조절
        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        // 파티클 객체 생성자
        class Particle {
            constructor() {
                this.reset();
            }
            // 파티클 위치 및 속성 초기화/재설정
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height + canvas.height; // 화면 아래쪽에서 생성되어 올라오도록
                this.size = Math.random() * 2 + 1; // 1px ~ 3px 크기
                this.speedX = Math.random() * 0.4 - 0.2; // 좌우 흔들림 속도
                this.speedY = -(Math.random() * 0.5 + 0.2); // 위로 올라가는 속도 (-0.2 ~ -0.7)
                // 주황색과 흰색 파티클을 은은한 투명도로 무작위 믹스
                const isOrange = Math.random() > 0.6;
                this.color = isOrange ? `rgba(255, 107, 0, ${Math.random() * 0.15 + 0.05})` : `rgba(248, 250, 252, ${Math.random() * 0.1 + 0.05})`;
            }
            // 위치 업데이트
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // 화면 위나 양옆으로 사라지면 다시 바닥이나 무작위 위치에서 재생성
                if (this.y < -10 || this.x < -10 || this.x > canvas.width + 10) {
                    this.reset();
                    this.y = canvas.height + 10;
                }
            }
            // 화면에 그리기
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        // 파티클 배열 초기화
        function init() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                const p = new Particle();
                // 초기 생성 시에는 화면 전체에 골고루 분산 배치
                p.y = Math.random() * canvas.height;
                particlesArray.push(p);
            }
        }
        init();

        // 매 프레임 애니메이션 루프 실행
        function animate() {
            // 이전 프레임 잔상 지우기
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }
        animate();
    })();
</script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('navToggle');
            const menu = document.getElementById('navMenu');

            if (toggleBtn && menu) {
                toggleBtn.addEventListener('click', () => {
                    toggleBtn.classList.toggle('open');
                    // Tailwind 우회 적용: right 클래스 제어
                    if(menu.classList.contains('-right-full')) {
                        menu.classList.remove('-right-full');
                        menu.classList.add('right-0');
                    } else {
                        menu.classList.remove('right-0');
                        menu.classList.add('-right-full');
                    }
                });

                menu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        toggleBtn.classList.remove('open');
                        menu.classList.remove('right-0');
                        menu.classList.add('-right-full');
                    });
                });
            }
        });
    </script>
<div id="custom-cursor" class="fixed top-0 left-0 w-6 h-6 bg-[#ff6b00] rounded-full pointer-events-none z-[9999] mix-blend-screen opacity-0 transition-opacity duration-300 -translate-x-1/2 -translate-y-1/2 shadow-[0_0_20px_10px_rgba(255,107,0,0.6),0_0_40px_20px_rgba(255,107,0,0.4)]"></div>

<script>
    (function() {
        const cursor = document.getElementById('custom-cursor');
        
        let mouseX = 0;
        let mouseY = 0;
        let currentX = 0;
        let currentY = 0;
        
        const speed = 0.3;
        
        // 특정 영역(네비게이션 바, 푸터) 내부인지 체크하는 플래그
        let isExcludedArea = false;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // 제외 영역에 있지 않고, 최초 움직임일 때 커서 표시
            if (!isExcludedArea && cursor.classList.contains('opacity-0')) {
                cursor.classList.remove('opacity-0');
            }
        });

        document.addEventListener('mouseleave', () => {
            cursor.classList.add('opacity-0');
        });

        function animateCursor() {
            currentX += (mouseX - currentX) * speed;
            currentY += (mouseY - currentY) * speed;
            
            cursor.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) translate(-50%, -50%)`;
            
            requestAnimationFrame(animateCursor);
        }
        
        animateCursor();

        // [네비게이션 바 & 푸터 영역 예외 처리]
        const excludedElements = document.querySelectorAll('.navbar, nav, footer');
        excludedElements.forEach(element => {
            element.addEventListener('mouseenter', () => {
                isExcludedArea = true;
                cursor.classList.add('opacity-0'); // 영역 진입 시 주황 불빛 숨김
            });
            element.addEventListener('mouseleave', () => {
                isExcludedArea = false;
                cursor.classList.remove('opacity-0'); // 영역 이탈 시 다시 표시
            });
        });

        // 클릭 가능 요소 호버 인터랙션 (제외 영역을 뺀 본문 콘텐츠 영역의 요소들만 타겟팅)
        const clickables = document.querySelectorAll('main a, section a, button:not(#navToggle), [role="button"]');
        clickables.forEach(item => {
            item.addEventListener('mouseenter', () => {
                if (!isExcludedArea) {
                    cursor.style.width = '40px';
                    cursor.style.height = '40px';
                    cursor.style.backgroundColor = '#ff8c39';
                }
            });
            item.addEventListener('mouseleave', () => {
                cursor.style.width = '24px';
                cursor.style.height = '24px';
                cursor.style.backgroundColor = '#ff6b00';
            });
        });
    })();
</script>

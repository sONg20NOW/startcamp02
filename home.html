<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>송강규 | 프론트엔드 개발자 포트폴리오</title>
    <!-- 프리텐다드 폰트 불러오기 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deep-navy': '#0f172a',
                        'card-navy': '#1e293b',
                        'point-orange': '#ff6b00',
                        'text-white': '#f8fafc',
                        'text-gray': '#94a3b8',
                        'footer-black': '#090d16',
                    },
                    fontFamily: {
                        sans: ["Pretendard Variable", "Pretendard", "sans-serif"],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: "Pretendard Variable", Pretendard, sans-serif;
        }
        /* 기존 네비게이션 액티브 표시용 밑줄 스타일 유지 */
        .nav-link-active::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 2px;
            background-color: #ff6b00;
        }
        /* 모바일 메뉴 X자 변형 애니메이션을 위한 커스텀 스타일 */
        .nav-toggle.open .bar-1 { transform: translateY(8px) rotate(45deg); }
        .nav-toggle.open .bar-2 { opacity: 0; }
        .nav-toggle.open .bar-3 { transform: translateY(-8px) rotate(-45deg); }
    </style>
</head>
<body class="bg-deep-navy text-text-white leading-relaxed overflow-x-hidden pt-[70px] flex flex-col h-full">

    <!-- 상단 네비게이션 바 -->
    <nav class="fixed top-0 left-0 w-full h-[70px] bg-deep-navy/90 backdrop-blur-md border-b border-text-gray/10 z-[1000]">
        <div class="flex justify-between align-items center items-center w-full max-w-[1100px] h-full mx-auto px-6">
            <a href="home.html" class="text-fe-white text-xl font-extrabold tracking-wider text-text-white">KANGGYU<span class="text-point-orange">.</span></a>
            
            <button class="nav-toggle flex flex-col justify-between w-6 h-[18px] bg-transparent border-none cursor-pointer p-0 z-[1101] md:hidden" id="navToggle" aria-label="메뉴 열기">
                <span class="bar-1 w-full height h-[2px] bg-text-white transition-all duration-200"></span>
                <span class="bar-2 w-full height h-[2px] bg-text-white transition-all duration-200"></span>
                <span class="bar-3 w-full height h-[2px] bg-text-white transition-all duration-200"></span>
            </button>
            
            <ul class="nav-menu fixed top-0 -right-full w-[260px] h-screen bg-card-navy flex flex-col items-start pt-[100px] px-8 gap-6 shadow-[-4px_0_20px_rgba(0,0,0,0.3)] transition-[right] duration-300 md:static md:w-auto md:h-auto md:bg-transparent md:flex-row md:items-center md:p-0 md:gap-8 md:shadow-none" id="navMenu">
                <li class="w-full md:w-auto"><a href="home.html" class="nav-link-active relative text-[1.1rem] md:text-[0.95rem] font-semibold text-point-orange block w-full py-2 md:inline">기본 홈</a></li>
                <li class="w-full md:w-auto"><a href="about.html" class="relative text-[1.1rem] md:text-[0.95rem] font-medium text-text-gray hover:text-text-white block w-full py-2 md:inline transition-colors duration-200">스토리와 루틴</a></li>
                <li class="w-full md:w-auto"><a href="skills.html" class="relative text-[1.1rem] md:text-[0.95rem] font-medium text-text-gray hover:text-text-white block w-full py-2 md:inline transition-colors duration-200">핵심 역량 헤드라인</a></li>
                <li class="w-full md:w-auto"><a href="target.html" class="relative text-[1.1rem] md:text-[0.95rem] font-medium text-text-gray hover:text-text-white block w-full py-2 md:inline transition-colors duration-200">목표 기업</a></li>
            </ul>
        </div>
    </nav>

    <!-- 본문 내용: 히어로 섹션 -->
    <section class="h-[calc(100vh-70px)] flex items-center justify-start py-[70px] md:py-[100px]">
        <div class="w-full max-w-[1100px] mx-auto px-6">
            <div class="max-w-[800px]">
                <p class="text-lg font-semibold text-point-orange mb-4 tracking-wider">01년생 프론트엔드 개발자 송강규</p>
                <h1 class="text-4xl md:text-[3.5rem] font-extrabold linear line-height leading-tight md:leading-[1.3] mb-6 break-keep">지치지 않는 페이스로,<br>복잡한 문제를 풀며 <span class="text-point-orange">함께 완주하는</span> 개발자</h1>
                <p class="text-ece text-xl text-text-gray mb-10 break-keep">안녕하세요, 2001년생 개발자 송강규입니다. 탄탄하게 다져진 기본기와 열정적인 러닝 페이스를 무기로, 화면 너머의 견고한 로직을 함께 빌드업하고 완주해 나갈 동료들을 기다립니다.</p>
                <a href="about.html" class="inline-block bg-point-orange text-text-white px-8 py-4 font-semibold rounded transition-all duration-200 hover:-translate-y-0.5 hover:bg-[#e56000]">내 스토리 보기</a>
            </div>
        </div>
    </section>

    <!-- 푸터 -->
    <footer class="bg-footer-black py-12 text-text-gray text-[0.95rem] w-full mt-auto">
        <div class="w-full max-w-[1100px] mx-auto px-6">
            <div class="flex justify-between items-center">
                <p>&copy; 2026 Song KangGyu. All rights reserved.</p>
                <div class="flex gap-6">
                    <a href="https://github.com" target="_blank" class="text-text-gray hover:text-point-orange transition-colors duration-200">Github</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- 네비게이션 스크립트 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('navToggle');
            const menu = document.getElementById('navMenu');

            if (toggleBtn && menu) {
                toggleBtn.addEventListener('click', () => {
                    toggleBtn.classList.toggle('open');
                    // Tailwind 우회 적용: right 클래스 제어
                    if(menu.classList.contains('-right-full')) {
                        menu.classList.remove('-right-full');
                        menu.classList.add('right-0');
                    } else {
                        menu.classList.remove('right-0');
                        menu.classList.add('-right-full');
                    }
                });

                menu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        toggleBtn.classList.remove('open');
                        menu.classList.remove('right-0');
                        menu.classList.add('-right-full');
                    });
                });
            }
        });
    </script>
</body>
</html>
